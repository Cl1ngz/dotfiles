# Kitty Material You - Distinction Edition
cursor            {{colors.primary.default.hex}}
cursor_text_color {{colors.on_primary.default.hex}}

# Base Colors
foreground        {{colors.on_surface.default.hex}}
background        {{colors.surface_container_low.default.hex}}
selection_foreground {{colors.on_secondary_container.default.hex}}
selection_background {{colors.secondary_container.default.hex}}
url_color         {{colors.tertiary.default.hex}}

# ANSI Colors (0-15)
# Black/Gray
color0  {{colors.surface_container_highest.default.hex}}
color8  {{colors.outline.default.hex}}

# Color 1: Red (Archives / Errors)
color1  {{colors.error.default.hex}}
color9  {{colors.error.default.hex | lighten: 15.0}}

# Color 2: Green role (Executables) -> Mapped to Tertiary for High Distinction
color2  {{colors.tertiary.default.hex}}
color10 {{colors.tertiary.default.hex | lighten: 20.0}}

# Color 3: Yellow (Warnings)
color3  {{colors.secondary_fixed_dim.default.hex}}
color11 {{colors.secondary_fixed.default.hex}}

# Color 4: Blue role (Directories) -> Mapped to Primary
color4  {{colors.primary.default.hex}}
color12 {{colors.primary_fixed.default.hex}}

# Color 5: Magenta (Keywords)
color5  {{colors.inverse_primary.default.hex}}
color13 {{colors.inverse_primary.default.hex | lighten: 15.0}}

# Color 6: Cyan (Links / Special)
color6  {{colors.on_tertiary_container.default.hex}}
color14 {{colors.tertiary_container.default.hex}}

# Color 7/15: White (Files / Normal Text)
color7  {{colors.on_surface_variant.default.hex}}
color15 {{colors.on_surface.default.hex}}

# UI Elements
active_tab_foreground   {{colors.on_primary.default.hex}}
active_tab_background   {{colors.primary.default.hex}}
inactive_tab_foreground {{colors.on_surface_variant.default.hex}}
inactive_tab_background {{colors.surface_container.default.hex}}
active_border_color     {{colors.primary.default.hex}}
inactive_border_color   {{colors.outline.default.hex}}
