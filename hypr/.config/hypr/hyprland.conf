source = ~/.config/hypr/conf/colors.conf
source = ~/.config/hypr/conf/windowrule.conf
source = ~/.config/hypr/conf/keybinds.conf
source = ~/.config/hypr/conf/startup.conf
source = ~/.config/hypr/conf/animations.conf


# Setup monitors
# See https://wiki.hyprland.org/Configuring/Monitors/

# default monitor setup
# monitor=,prefered,auto,1

# mirroring setup
# monitor=,prefered,auto,1, mirror, eDP-1 

# for battery save lower refresh rate
# monitor=,1920x1080@60,auto,1


# Dual monitor setup
# hyprctl monitors for name (id) and modes
# monitor = name, resolution, position, scale
monitor = eDP-1, 1920x1080@144, 0x0, 1
# monitor = DP-1, 1920x1080@60, 1920x0, 1
monitor = HDMI-A-1, 1920x1080@60, 1920x0, 1#, transform, 1


# exec = ~/.config/HyprV/hyprv_util setbg

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = pl,us
    kb_variant =
    kb_model =
    kb_options = #grp:win_space_toggle #to toggle on super+space
    kb_rules = 
    numlock_by_default = true

    follow_mouse = 0
    force_no_accel = 0
    force_no_accel = false

    touchpad {
        natural_scroll = no
    }


    sensitivity = -0.5 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 3
    gaps_out = 3
    border_size = 1
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    # col.active_border=rgb(cdd6f4)
    # col.active_border=0xFF4A6A48
    col.active_border = $primary $tertiary 45deg
    col.inactive_border = $surface-container
    # col.inactive_border = rgba(595959aa)
    # col.inactive_border = 

    layout = dwindle
}

misc {
    disable_hyprland_logo = yes
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 6
    rounding = 25

    active_opacity = 1.0
    inactive_opacity = 0.92
    
    blur {
        enabled = true
        size = 10
        passes = 1
        noise = 0.01
        contrast = 0.6
        vibrancy = 0.1

        # new_optimizations = true
        # xray = true
        #ignore_opacity = true
    }

    # blurls = lockscreen

    shadow{
      enabled = true
      range = 25
      render_power = 3
      color = rgba(1a1b2699)
    }
}

