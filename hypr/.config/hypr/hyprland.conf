source = ~/.config/hypr/conf/colors.conf
source = ~/.config/hypr/conf/windowrule.conf
source = ~/.config/hypr/conf/keybinds.conf
source = ~/.config/hypr/conf/startup.conf
source = ~/.config/hypr/conf/animations.conf
source = ~/.config/hypr/conf/monitors.conf
source = ~/.config/hypr/conf/input_gestures.conf
source = ~/.config/hypr/conf/decoration.conf


# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 3
    gaps_out = 3
    border_size = 1
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    # col.active_border=rgb(cdd6f4)
    # col.active_border=0xFF4A6A48
    col.active_border = $primary $tertiary 45deg
    col.inactive_border = $surface-container
    # col.inactive_border = rgba(595959aa)
    # col.inactive_border = 

    layout = dwindle
}

misc {
    disable_hyprland_logo = yes
}


layerrule = no_anim on, match:class ^(selection)

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_on_top = true
}


