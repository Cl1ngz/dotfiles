source = /home/cl1ngz/.config/hypr/hyprlock-colors.conf
# --- General ---
general {
    monitor =
}

# --- Background ---
background {
    monitor =
    path = /home/cl1ngz/.config/hypr/wallpaper/current_wall 
    color = $surface

    blur_passes = 3 # More passes = smoother blur, very light on GPU
    blur_size = 5   # The amount of blur
    noise = 0.0117  # Optional subtle grain
    contrast = 1.0  # Optional contrast adjustment
    brightness = 0.8 # Slights dims background for better focus
    vibrancy = 0.2
    vibrancy_darkness = 0.1
}

# --- Time Label ---
label {
    monitor =
    text = $TIME
    color = $primary
    font_size = 40
    font_family = sans-serif
    position = 0, -50 
    halign = center
    valign = top
}

# --- Date Label ---
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +'%d %B %Y')"
    color = $secondary
    font_size = 14
    font_family = sans-serif
    position = 0, -110 
    halign = center
    valign = top
}

# --- Input Field ---
input-field {
    monitor =
    size = 200, 50 # Width, height
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    
    # Text colors
    font_color = $on_surface
    outer_color = $outline
    inner_color = $surface_container
    check_color = $tertiary
    fail_color = $error
    
    # Status messages and input feedback
    placeholder_text = <i>Input Password...</i>
    fail_text = <i>Password Incorrect!</i> 
    fade_on_empty = true
    hide_input = false
    
    position = 0, -20
    halign = center
    valign = center # Places in the center screen
    
    # Subdued central shadows
    shadow_passes = 1
    shadow_size = 10
    shadow_color = rgba(10, 10, 10, 0.5)
}
