# --- General ---
general {
    # Uses the primary monitor's background, no matter its index
    monitor =
}

# --- Background ---
background {
    monitor =
    # The image path to your exact wallpaper (replace 'image_1.png' if named differently)
    path = /home/cl1ngz/Pictures/CurrnetActiveWallpaper/space-ppl.jpg 
    color = rgba(25, 20, 20, 1.0) # Fallback solid color

    # GPU-accelerated blur effects (replace swaylock's heavy effects)
    # The GPU handles these, not the CPU.
    blur_passes = 3 # More passes = smoother blur, very light on GPU
    blur_size = 5   # The amount of blur
    noise = 0.0117  # Optional subtle grain
    contrast = 1.0  # Optional contrast adjustment
    brightness = 0.8 # Slights dims background for better focus
    vibrancy = 0.2
    vibrancy_darkness = 0.1
}

# --- Time Label ---
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.9)
    font_size = 40
    font_family = sans-serif
    position = 0, -50 
    halign = center
    valign = top
}

# --- Date Label ---
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +'%d %B %Y')"
    color = rgba(255, 255, 255, 0.7)
    font_size = 14
    font_family = sans-serif
    position = 0, -110 
    halign = center
    valign = top
}

# --- Input Field ---
input-field {
    monitor =
    size = 200, 50 # Width, height
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    
    # Text colors
    font_color = rgb(10, 10, 10)
    outer_color = rgba(200, 255, 255, 0.7) # Outer ring matching vibe
    inner_color = rgb(255, 255, 255)       # Pure white background
    
    # Status messages and input feedback
    placeholder_text = <i>Input Password...</i>
    fail_text = <i>Password Incorrect!</i>
    fade_on_empty = true
    hide_input = false
    
    position = 0, -20
    halign = center
    valign = center # Places in the center screen
    
    # Subdued central shadows
    shadow_passes = 1
    shadow_size = 10
    shadow_color = rgba(10, 10, 10, 0.5)
}
